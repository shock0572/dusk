name: CI

on:
  push:
    branches: [main]
    tags: ["*"]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - run: cargo build --release --target x86_64-pc-windows-msvc
      - run: |
          mkdir dist
          cp target/x86_64-pc-windows-msvc/release/dusk.exe dist/dusk-windows-x86_64.exe
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: dusk-windows-x86_64
          path: dist/dusk-windows-x86_64.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: cargo build --release --target x86_64-unknown-linux-musl
      - run: |
          mkdir dist
          cp target/x86_64-unknown-linux-musl/release/dusk dist/dusk-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: dusk-linux-x86_64
          path: dist/dusk-linux-x86_64

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          name: DUSK ${{ github.ref_name }}
          files: |
            dist/dusk-windows-x86_64.exe
            dist/dusk-linux-x86_64
