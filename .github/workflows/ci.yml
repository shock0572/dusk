name: CI

on:
  push:
    branches: [main]
    tags: ["*"]

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - run: cargo build --release --target x86_64-pc-windows-msvc
      - run: |
          mkdir dist
          cp target/x86_64-pc-windows-msvc/release/dusk.exe dist/dusk-windows-x86_64.exe
        shell: bash
      - uses: actions/upload-artifact@v7
        with:
          name: dusk-windows-x86_64
          path: dist/dusk-windows-x86_64.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: cargo build --release --target x86_64-unknown-linux-musl
      - run: |
          mkdir dist
          cp target/x86_64-unknown-linux-musl/release/dusk dist/dusk-linux-x86_64
      - uses: actions/upload-artifact@v7
        with:
          name: dusk-linux-x86_64
          path: dist/dusk-linux-x86_64

  build-macos:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      # Rust/cargo is pre-installed on the macos-26 (Apple Silicon) image, and
      # the host target is aarch64-apple-darwin, so a plain release build
      # produces a native arm64 binary with no cross-compilation.
      - run: cargo build --release
      - run: |
          mkdir dist
          cp target/release/dusk dist/dusk-macos-aarch64
      - uses: actions/upload-artifact@v7
        with:
          name: dusk-macos-aarch64
          path: dist/dusk-macos-aarch64

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          name: DUSK ${{ github.ref_name }}
          files: |
            dist/dusk-windows-x86_64.exe
            dist/dusk-linux-x86_64
            dist/dusk-macos-aarch64
